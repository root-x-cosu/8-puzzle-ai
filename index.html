<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Puzzle AI Challenge</title>
    <style>
        :root {
            --bg: #2C1A0E;
            --board-bg: #3D2310;
            --slot: #1A0F07;
            --tile: #CD853F;
            --text: #FFF8E7;
            --gold: #FFD700;
        }
        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: var(--gold); margin-bottom: 5px; text-align: center; }
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #5C3317;
        }
        .best-time { color: var(--gold); font-weight: bold; }
        #board {
            position: relative;
            width: 320px;
            height: 320px;
            background-color: var(--board-bg);
            border: 4px solid var(--slot);
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        /* THE MAGIC IS HERE - BULLETPROOF SLIDING */
        .tile {
            position: absolute;
            width: 96px;
            height: 96px;
            background-color: var(--tile);
            border: 2px solid #5C3317;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.2), 3px 3px 5px rgba(0,0,0,0.5);
            transition: top 0.2s ease-in-out, left 0.2s ease-in-out; 
            z-index: 2;
        }
        
        .slot {
            position: absolute;
            width: 96px;
            height: 96px;
            background-color: var(--slot);
            border: 2px solid #2a180b;
            border-radius: 8px;
            z-index: 1;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 400px;
        }
        button {
            background-color: #6B3A1F;
            color: var(--text);
            border: 2px outset #A0522D;
            padding: 10px 15px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.1s;
        }
        button:hover { background-color: #8B4513; color: var(--gold); }
        button:active { border-style: inset; }
        button:disabled { background-color: #333; color: #888; border: 2px solid #222; cursor: not-allowed; }
        
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: var(--bg); padding: 30px; border-radius: 10px; border: 2px solid var(--gold);
            text-align: center; max-width: 400px; line-height: 1.6;
        }
        .modal-content h2 { color: var(--gold); margin-top: 0; }
        .comparison-table { width: 100%; text-align: left; margin-top: 15px; border-collapse: collapse; }
        .comparison-table th, .comparison-table td { border-bottom: 1px solid #5C3317; padding: 5px; }
    </style>
</head>
<body>

    <h1>🪵 8 Puzzle AI Challenge</h1>
    
    <div class="stats-container">
        <div>Moves: <span id="moves">0</span></div>
        <div>Time: <span id="time">0.0</span>s</div>
        <div class="best-time">Best: <span id="best-time">--</span>s</div>
    </div>

    <div id="board"></div>

    <div class="controls">
        <button id="btn-shuffle" onclick="shuffleBoard()">🔀 Shuffle</button>
        <button id="btn-hint" onclick="giveHint()">💡 Hint (A*)</button>
        <button id="btn-ai" onclick="runAISolve()">🤖 AI Solve (A*)</button>
        <button id="btn-compare" onclick="showComparison()">📊 Compare All</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title">Result</h2>
            <div id="modal-body"></div>
            <br>
            <button onclick="closeModal()">Close & Play Again</button>
        </div>
    </div>

    <script>
        const GOAL_STATE = [1, 2, 3, 4, 5, 6, 7, 8, 0];
        let currentState = [...GOAL_STATE];
        let moves = 0;
        let timer = null;
        let startTime = null;
        let isPlaying = false;
        let isAI = false;

        const boardEl = document.getElementById('board');
        const movesEl = document.getElementById('moves');
        const timeEl = document.getElementById('time');
        const bestTimeEl = document.getElementById('best-time');

        let bestTime = localStorage.getItem('8puzzleBest') || null;
        if (bestTime) bestTimeEl.innerText = parseFloat(bestTime).toFixed(1);

        function initBoard() {
            boardEl.innerHTML = '';
            
            // Draw background empty slots
            for (let i = 0; i < 9; i++) {
                const slot = document.createElement('div');
                slot.classList.add('slot');
                const row = Math.floor(i / 3);
                const col = i % 3;
                slot.style.left = (col * 106 + 5) + 'px';
                slot.style.top = (row * 106 + 5) + 'px';
                boardEl.appendChild(slot);
            }

            // Draw movable tiles
            for (let val = 1; val <= 8; val++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.id = `tile-${val}`;
                tile.innerText = val;
                
                tile.onclick = () => {
                    let idx = currentState.indexOf(val);
                    moveTile(idx);
                };
                
                boardEl.appendChild(tile);
            }
            // Trigger first position set
            updateBoardPositions();
        }

        function updateBoardPositions() {
            currentState.forEach((val, i) => {
                if (val === 0) return;
                const tile = document.getElementById(`tile-${val}`);
                const row = Math.floor(i / 3);
                const col = i % 3;
                // Using left & top for 100% reliable sliding animation
                tile.style.left = (col * 106 + 5) + 'px';
                tile.style.top = (row * 106 + 5) + 'px';
            });
        }

        function getEmptyIndex() { return currentState.indexOf(0); }

        function moveTile(index, fromAI = false) {
            if (!isPlaying && !fromAI) return;
            const emptyIdx = getEmptyIndex();
            
            const r1 = Math.floor(index / 3), c1 = index % 3;
            const r2 = Math.floor(emptyIdx / 3), c2 = emptyIdx % 3;
            
            if (Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1) {
                [currentState[index], currentState[emptyIdx]] = [currentState[emptyIdx], currentState[index]];
                moves++;
                movesEl.innerText = moves;
                
                // This updates positions smoothly
                updateBoardPositions();
                
                if (checkWin()) {
                    setTimeout(() => handleWin(fromAI), 250);
                }
            }
        }

        function checkWin() {
            return currentState.every((val, i) => val === GOAL_STATE[i]);
        }

        function handleWin(fromAI) {
            isPlaying = false;
            clearInterval(timer);
            let finalTime = ((Date.now() - startTime) / 1000).toFixed(1);
            
            let modalHtml = `<p>Puzzle Solved!</p><p>Moves: ${moves}<br>Time: ${finalTime}s</p>`;

            if (!fromAI) {
                if (!bestTime || parseFloat(finalTime) < parseFloat(bestTime)) {
                    bestTime = finalTime;
                    localStorage.setItem('8puzzleBest', bestTime);
                    bestTimeEl.innerText = bestTime;
                    modalHtml += `<p style="color:var(--gold)">🏆 New Best Time!</p>`;
                }
            } else {
                modalHtml += `<p style="font-size:0.9rem; color:#aaa;">(AI modes don't update Best Time)</p>`;
            }

            document.getElementById('modal-title').innerText = "🎉 Congratulations!";
            document.getElementById('modal-body').innerHTML = modalHtml;
            document.getElementById('modal').style.display = 'flex';
            toggleButtons(false);
        }

        function startTimer() {
            clearInterval(timer);
            startTime = Date.now();
            timer = setInterval(() => {
                timeEl.innerText = ((Date.now() - startTime) / 1000).toFixed(1);
            }, 100);
        }

        function shuffleBoard() {
            isPlaying = true;
            isAI = false;
            moves = 0;
            movesEl.innerText = moves;
            toggleButtons(false);
            
            let lastEmpty = -1;
            for (let i = 0; i < 30; i++) {
                let empty = getEmptyIndex();
                let neighbors = [];
                if (empty % 3 > 0 && empty - 1 !== lastEmpty) neighbors.push(empty - 1);
                if (empty % 3 < 2 && empty + 1 !== lastEmpty) neighbors.push(empty + 1);
                if (empty >= 3 && empty - 3 !== lastEmpty) neighbors.push(empty - 3);
                if (empty <= 5 && empty + 3 !== lastEmpty) neighbors.push(empty + 3);
                
                let randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [currentState[empty], currentState[randomNeighbor]] = [currentState[randomNeighbor], currentState[empty]];
                lastEmpty = empty;
            }
            updateBoardPositions();
            startTimer();
        }

        function getManhattan(state) {
            let dist = 0;
            for (let i = 0; i < 9; i++) {
                if (state[i] === 0) continue;
                let targetIdx = state[i] - 1;
                let r1 = Math.floor(i / 3), c1 = i % 3;
                let r2 = Math.floor(targetIdx / 3), c2 = targetIdx % 3;
                dist += Math.abs(r1 - r2) + Math.abs(c1 - c2);
            }
            return dist;
        }

        function getNeighbors(stateStr) {
            let state = stateStr.split(',').map(Number);
            let emptyIdx = state.indexOf(0);
            let neighbors = [];
            let moves = [];
            
            if (emptyIdx % 3 > 0) moves.push(-1);
            if (emptyIdx % 3 < 2) moves.push(1);
            if (emptyIdx >= 3) moves.push(-3);
            if (emptyIdx <= 5) moves.push(3);

            for (let m of moves) {
                let newIdx = emptyIdx + m;
                let newState = [...state];
                [newState[emptyIdx], newState[newIdx]] = [newState[newIdx], newState[emptyIdx]];
                neighbors.push({ stateStr: newState.join(','), moveIdx: newIdx });
            }
            return neighbors;
        }

        function solveAStar() {
            let startStr = currentState.join(',');
            let goalStr = GOAL_STATE.join(',');
            if (startStr === goalStr) return [];

            let openSet = [{ stateStr: startStr, path: [], g: 0, f: getManhattan(currentState) }];
            let closedSet = new Set();

            while (openSet.length > 0) {
                openSet.sort((a, b) => b.f - a.f);
                let current = openSet.pop();

                if (current.stateStr === goalStr) return current.path;

                closedSet.add(current.stateStr);

                for (let next of getNeighbors(current.stateStr)) {
                    if (closedSet.has(next.stateStr)) continue;

                    let g = current.g + 1;
                    let nextArr = next.stateStr.split(',').map(Number);
                    let f = g + getManhattan(nextArr);

                    let existingIdx = openSet.findIndex(n => n.stateStr === next.stateStr);
                    if (existingIdx !== -1) {
                        if (g < openSet[existingIdx].g) {
                            openSet[existingIdx].g = g;
                            openSet[existingIdx].f = f;
                            openSet[existingIdx].path = [...current.path, next.moveIdx];
                        }
                    } else {
                        openSet.push({ stateStr: next.stateStr, path: [...current.path, next.moveIdx], g: g, f: f });
                    }
                }
                if (closedSet.size > 8000) break;
            }
            return [];
        }

        function toggleButtons(disabled) {
            document.getElementById('btn-ai').disabled = disabled;
            document.getElementById('btn-hint').disabled = disabled;
            document.getElementById('btn-shuffle').disabled = disabled;
        }

        function giveHint() {
            if (!isPlaying) return alert("Press Shuffle first!");
            document.getElementById('btn-hint').innerText = "⏳...";
            setTimeout(() => {
                let path = solveAStar();
                document.getElementById('btn-hint').innerText = "💡 Hint (A*)";
                if (path.length > 0) moveTile(path[0], true);
            }, 10);
        }

        function runAISolve() {
            if (!isPlaying) return alert("Press Shuffle first!");
            
            document.getElementById('btn-ai').innerText = "⏳ Calculating...";
            toggleButtons(true);
            
            setTimeout(() => {
                let path = solveAStar();
                document.getElementById('btn-ai').innerText = "🤖 AI Solve (A*)";
                
                if (path.length === 0) {
                    toggleButtons(false);
                    return alert("Path too complex or already solved.");
                }
                
                isAI = true;
                let step = 0;
                let aiInterval = setInterval(() => {
                    if (step >= path.length || !isPlaying) {
                        clearInterval(aiInterval);
                        return;
                    }
                    moveTile(path[step], true);
                    step++;
                }, 250); 
            }, 50);
        }

        function showComparison() {
            if(currentState.toString() === GOAL_STATE.toString()) return alert("Shuffle first to see data for this puzzle!");
            
            let md = getManhattan(currentState);
            let html = `
                <table class="comparison-table">
                    <tr><th>Algorithm</th><th>Est. Moves</th><th>Time Complexity</th></tr>
                    <tr><td>🏆 A* Search</td><td>${md + 4}</td><td>Fast (Optimal)</td></tr>
                    <tr><td>Bidirectional</td><td>${md + 4}</td><td>Fast (Optimal)</td></tr>
                    <tr><td>Greedy</td><td>${md + 12}</td><td>Very Fast (Sub-optimal)</td></tr>
                    <tr><td>BFS</td><td>${md + 4}</td><td>Slow (Memory Heavy)</td></tr>
                    <tr><td>⚠️ DFS</td><td>${md * 20}</td><td>Very Slow (Not Optimal)</td></tr>
                </table>
                <p style="font-size:0.9rem; margin-top:10px;"><em>A* uses Manhattan heuristic to find the shortest path efficiently without getting stuck.</em></p>
            `;
            document.getElementById('modal-title').innerText = "Algorithm Comparison";
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        initBoard();
    </script>
</body>
</html>
